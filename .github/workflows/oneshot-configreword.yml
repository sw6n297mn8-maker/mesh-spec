name: oneshot-configreword

on: push

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: cue-lang/setup-cue@v1.0.0
        with:
          version: v0.16.0

      - name: Reword B/C/D no config + regen README (one-shot)
        run: |
          set -e
          python3 scripts/ci/_apply_configreword_oneshot.py
          cue export ./governance/readme -e output --out text > README.md
          git add governance/readme/config.cue README.md
          if git diff --cached --quiet; then
            echo "nada a commitar (idempotente)."
            exit 0
          fi
          cue vet ./...
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(adr-090 c7): reword B/C/D no config (10 paths concretos -> planejado) + README regen"
          git push origin "HEAD:${GITHUB_REF_NAME}" || echo "push falhou (corrida); proxima run reconcilia"
