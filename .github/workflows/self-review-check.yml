name: Self Review Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  self-review-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install CUE
        uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1 — node20 — sem release node24 disponivel; risco aceito ate set/2026, substituicao por download direto do binario
        with:
          version: v0.16.0

      - name: Run self-review enforcement
        run: bash scripts/ci/check-self-review.sh
