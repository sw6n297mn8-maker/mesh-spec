name: Self Review Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  self-review-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CUE
        uses: cue-lang/setup-cue@v1.0.0
        with:
          version: v0.16.0

      - name: Run self-review enforcement
        run: bash scripts/ci/check-self-review.sh
