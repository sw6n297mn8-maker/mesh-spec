name: materialize-structure-index

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1 — node20 — sem release node24 disponivel; risco aceito ate set/2026, substituicao por download direto do binario
        with:
          version: v0.16.0

      - name: Regenerate and auto-commit structure-index
        run: |
          python3 scripts/ci/generate-structure-index.py . > governance/readme/structure-index.cue
          git add governance/readme/structure-index.cue
          if git diff --cached --quiet; then
            echo "structure-index.cue em sincronia; nada a commitar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(ci): regenerate structure-index.cue (derivado, adr-090)"
          git push origin "HEAD:${GITHUB_REF_NAME}" || echo "push falhou (provavel corrida ou permissao); proxima run reconcilia"
