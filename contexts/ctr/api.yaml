openapi: "3.1.0"
info:
  title: "Contract & Terms Registry API"
  version: "1.0.0"
  description: |
    API sincrona do CTR — registry canonico de termos contratuais.

    Termos sao imutaveis apos ativacao. Qualquer alteracao cria nova
    versao com lineage explicito. Invariante: exatamente uma versao
    `active` por contrato+escopo.

    ## Consumers
    - **CMT**: referencia termos vigentes ao formalizar compromissos
    - **SCF**: consulta termos para precificacao de antecipacoes
    - **DRC**: consulta clausulas para base juridica de disputas
    - **ITC**: consome termos para governar operacoes de comex

    ## Lifecycle
    `draft` -> `active` -> `superseded` | `expired` | `cancelled`
    `draft` -> `cancelled`

    ## Operacoes assincronas
    Registro e revisao retornam 202 com URI de rastreamento.
    Opcionalmente, informe `callback_url` para notificacao push.

    ## Caching
    Endpoints de leitura retornam `ETag`. Clientes devem enviar
    `If-None-Match` para conditional GET — resposta 304 quando
    nao ha mudanca.

    ## Evolucao
    Endpoints em processo de descontinuacao sinalizam via headers
    `Deprecation` (RFC draft) e `Sunset` (RFC 8594) com datas de
    remocao. Clientes devem monitorar estes headers e migrar antes
    da data Sunset.

servers:
  - url: "https://api.mesh.internal/ctr/v1"
    description: "Production"
  - url: "https://sandbox.mesh.internal/ctr/v1"
    description: "Sandbox"

tags:
  - name: "contract-terms"
    description: "Aggregate Contract Terms"
  - name: "versions"
    description: "Versoes de termos"
  - name: "clauses"
    description: "Clausulas contratuais"
  - name: "operations"
    description: "Rastreamento de operacoes assincronas"

paths:
  /contract-terms:
    get:
      tags: ["contract-terms"]
      summary: "Buscar termos por contrato"
      operationId: "searchContractTerms"
      description: |
        Busca aggregates por contract_id, opcionalmente filtrado por
        scope_description. Retorna lista paginada com versao active expandida
        (se existir).
      parameters:
        - name: contract_id
          in: query
          required: true
          schema:
            type: string
          description: "ID do contrato — filtro primario obrigatorio"
        - name: scope_description
          in: query
          schema:
            type: string
          description: "Filtro secundario por descricao de escopo"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: "Resultados da busca"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractTermsListResponse"

    post:
      tags: ["contract-terms"]
      summary: "Registrar termos contratuais"
      operationId: "registerContractTerms"
      description: |
        Submete registro de termos com partes, clausulas e escopo.
        Processamento assincrono — validacao de participantes em NPM
        e completude estrutural ocorre em background.
        Retorna 202 com URI de rastreamento.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterContractTermsRequest"
      responses:
        "202":
          description: "Aceito para processamento"
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /contract-terms/{contractTermsId}:
    get:
      tags: ["contract-terms"]
      summary: "Consultar termos (versao active)"
      operationId: "getContractTerms"
      description: |
        Retorna aggregate com versao active expandida.
        Suporta `as_of` para reconstrucao temporal regulatoria.
      parameters:
        - $ref: "#/components/parameters/ContractTermsId"
        - $ref: "#/components/parameters/IfNoneMatch"
        - name: as_of
          in: query
          schema:
            type: string
            format: date-time
          description: "Retorna versao que era active nesta data"
      responses:
        "200":
          description: "Termos encontrados"
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractTermsResponse"
        "304":
          description: "Nao modificado (ETag match)"
        "404":
          $ref: "#/components/responses/NotFound"

  /contract-terms/{contractTermsId}/versions:
    get:
      tags: ["versions"]
      summary: "Listar versoes"
      operationId: "listTermsVersions"
      parameters:
        - $ref: "#/components/parameters/ContractTermsId"
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/TermsState"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: "Lista de versoes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TermsVersionListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /contract-terms/{contractTermsId}/versions/{versionNumber}:
    get:
      tags: ["versions"]
      summary: "Consultar versao (version-pinned)"
      operationId: "getTermsVersion"
      description: |
        Retorna versao especifica. Preferido para operacoes ja
        formalizadas que referenciam versao exata.
      parameters:
        - $ref: "#/components/parameters/ContractTermsId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: "Versao encontrada"
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TermsVersionResponse"
        "304":
          description: "Nao modificado (ETag match)"
        "404":
          $ref: "#/components/responses/NotFound"

  /contract-terms/{contractTermsId}/versions/{versionNumber}/activate:
    post:
      tags: ["versions"]
      summary: "Ativar versao de termos"
      operationId: "activateContractTerms"
      description: |
        Transiciona de `draft` para `active`. Sincrono.
        **Decisao supervisionada** — requer `supervision_token`.
        Se existir versao active anterior, supersede atomicamente.
      parameters:
        - $ref: "#/components/parameters/ContractTermsId"
        - $ref: "#/components/parameters/VersionNumber"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateRequest"
      responses:
        "200":
          description: "Ativado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationResponse"
        "403":
          $ref: "#/components/responses/SupervisionRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /contract-terms/{contractTermsId}/versions/{versionNumber}/cancel:
    post:
      tags: ["versions"]
      summary: "Cancelar versao de termos"
      operationId: "cancelContractTerms"
      description: |
        Estado terminal irreversivel. Aceita `draft` ou `active`.
        **Decisao supervisionada**.
      parameters:
        - $ref: "#/components/parameters/ContractTermsId"
        - $ref: "#/components/parameters/VersionNumber"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRequest"
      responses:
        "200":
          description: "Cancelado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TermsVersionResponse"
        "403":
          $ref: "#/components/responses/SupervisionRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /contract-terms/{contractTermsId}/revisions:
    post:
      tags: ["versions"]
      summary: "Registrar revisao de termos"
      operationId: "registerTermsRevision"
      description: |
        Nova versao em `draft` com lineage. Assincrono.
      parameters:
        - $ref: "#/components/parameters/ContractTermsId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTermsRevisionRequest"
      responses:
        "202":
          description: "Aceito"
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationAccepted"
        "404":
          $ref: "#/components/responses/NotFound"

  /contract-terms/{contractTermsId}/versions/{versionNumber}/clauses:
    get:
      tags: ["clauses"]
      summary: "Consultar clausulas"
      operationId: "queryContractClauses"
      description: |
        Interface primaria consumida por DRC para base juridica.
      parameters:
        - $ref: "#/components/parameters/ContractTermsId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/IfNoneMatch"
        - name: type
          in: query
          schema:
            type: string
            enum: [sla, retention, penalty, warranty, cancellation]
      responses:
        "200":
          description: "Clausulas"
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractClausesResponse"
        "304":
          description: "Nao modificado (ETag match)"
        "404":
          $ref: "#/components/responses/NotFound"

  /operations/{operationId}:
    get:
      tags: ["operations"]
      summary: "Status de operacao assincrona"
      operationId: "getOperationStatus"
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  headers:
    Deprecation:
      description: |
        Sinaliza que o endpoint esta em processo de descontinuacao.
        Valor: "true" ou data ISO 8601 indicando quando a deprecacao
        foi declarada. Clientes devem planejar migracao.
      schema:
        type: string
      example: "2026-06-01T00:00:00Z"
    Sunset:
      description: |
        Data apos a qual o endpoint pode ser removido (RFC 8594).
        Clientes DEVEM migrar antes desta data.
      schema:
        type: string
        format: date-time
      example: "2026-12-01T00:00:00Z"

  parameters:
    ContractTermsId:
      name: contractTermsId
      in: path
      required: true
      schema:
        type: string
    VersionNumber:
      name: versionNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: "Chave de idempotencia para retry seguro"
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      schema:
        type: string
      description: "ETag previamente recebido para conditional GET (304 se match)"
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    PageToken:
      name: page_token
      in: query
      schema:
        type: string

  schemas:
    # -- Requests --

    RegisterContractTermsRequest:
      type: object
      required: [scope, parties, clauses, validity_period]
      properties:
        scope:
          $ref: "#/components/schemas/ContractScopeInput"
        parties:
          $ref: "#/components/schemas/ContractPartiesInput"
        clauses:
          type: array
          items:
            $ref: "#/components/schemas/ContractClauseInput"
          minItems: 1
        validity_period:
          $ref: "#/components/schemas/ValidityPeriodInput"
        callback_url:
          type: string
          format: uri
          description: "URL para notificacao push ao completar"

    RegisterTermsRevisionRequest:
      type: object
      required: [clauses, validity_period]
      properties:
        clauses:
          type: array
          items:
            $ref: "#/components/schemas/ContractClauseInput"
          minItems: 1
        validity_period:
          $ref: "#/components/schemas/ValidityPeriodInput"
        callback_url:
          type: string
          format: uri

    ActivateRequest:
      type: object
      required: [supervision_token]
      properties:
        supervision_token:
          type: string
          description: "Token de autorizacao de supervisao humana"

    CancelRequest:
      type: object
      required: [reason_type, detail, supervision_token]
      properties:
        reason_type:
          type: string
          enum: [fraud, error, regulatory, other]
        detail:
          type: string
          minLength: 10
          description: "Justificativa detalhada para auditoria"
        supervision_token:
          type: string

    # -- Responses --

    ContractTermsResponse:
      type: object
      properties:
        id:
          type: string
        scope:
          $ref: "#/components/schemas/ContractScope"
        active_version:
          oneOf:
            - $ref: "#/components/schemas/TermsVersion"
            - type: "null"
        version_count:
          type: integer
        created_at:
          type: string
          format: date-time
        _links:
          $ref: "#/components/schemas/ContractTermsLinks"

    ContractTermsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContractTermsResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"

    TermsVersionResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/TermsVersion"
        _links:
          $ref: "#/components/schemas/TermsVersionLinks"

    TermsVersionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TermsVersion"
        pagination:
          $ref: "#/components/schemas/Pagination"

    ActivationResponse:
      type: object
      properties:
        activated_version:
          $ref: "#/components/schemas/TermsVersion"
        superseded_version:
          oneOf:
            - $ref: "#/components/schemas/TermsVersionSummary"
            - type: "null"
          description: "Versao que foi supersedida, se existia"
        supervision_evidence:
          $ref: "#/components/schemas/SupervisionEvidence"

    ContractClausesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContractClause"
        contract_terms_id:
          type: string
        version_number:
          type: integer

    OperationAccepted:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending]
        _links:
          type: object
          properties:
            status:
              type: string
              format: uri

    OperationStatusResponse:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        result:
          oneOf:
            - $ref: "#/components/schemas/TermsVersion"
            - type: "null"
        error:
          oneOf:
            - $ref: "#/components/schemas/ProblemDetail"
            - type: "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # -- Domain schemas --

    TermsVersion:
      type: object
      properties:
        contract_terms_id:
          type: string
        version_number:
          type: integer
        state:
          $ref: "#/components/schemas/TermsState"
        scope:
          $ref: "#/components/schemas/ContractScope"
        parties:
          $ref: "#/components/schemas/ContractParties"
        clauses:
          type: array
          items:
            $ref: "#/components/schemas/ContractClause"
        validity_period:
          $ref: "#/components/schemas/ValidityPeriod"
        lineage:
          $ref: "#/components/schemas/Lineage"
        activated_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          description: "Actor que criou (agent ID ou user ID)"
        activated_by:
          type: string
          nullable: true
          description: "Actor que ativou (supervisor ID)"

    TermsVersionSummary:
      type: object
      properties:
        version_number:
          type: integer
        state:
          $ref: "#/components/schemas/TermsState"

    TermsState:
      type: string
      enum: [draft, active, superseded, expired, cancelled]

    ContractScope:
      type: object
      properties:
        contract_id:
          type: string
        scope_description:
          type: string

    ContractScopeInput:
      type: object
      required: [contract_id, scope_description]
      properties:
        contract_id:
          type: string
        scope_description:
          type: string

    ContractParties:
      type: object
      properties:
        registrant:
          $ref: "#/components/schemas/Participant"
        counterparty:
          $ref: "#/components/schemas/Participant"

    ContractPartiesInput:
      type: object
      required: [registrant_id, counterparty_id]
      properties:
        registrant_id:
          type: string
          description: "ID do participante em NPM"
        counterparty_id:
          type: string

    Participant:
      type: object
      properties:
        participant_id:
          type: string
        qualification_status:
          type: string
          enum: [qualified, suspended, pending]
          description: "Status resolvido de NPM"

    ValidityPeriod:
      type: object
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    ValidityPeriodInput:
      type: object
      required: [start_date, end_date]
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    Lineage:
      type: object
      properties:
        chain_origin:
          type: boolean
        previous_version:
          type: integer
          nullable: true

    ContractClause:
      type: object
      properties:
        clause_id:
          type: string
        type:
          type: string
          enum: [sla, retention, penalty, warranty, cancellation]
        description:
          type: string
        value:
          type: string

    ContractClauseInput:
      type: object
      required: [type, description, value]
      properties:
        type:
          type: string
          enum: [sla, retention, penalty, warranty, cancellation]
        description:
          type: string
          minLength: 1
        value:
          type: string
          minLength: 1

    SupervisionEvidence:
      type: object
      properties:
        supervisor_id:
          type: string
        authorized_at:
          type: string
          format: date-time
        token_ref:
          type: string

    # -- Infra --

    Pagination:
      type: object
      properties:
        next_page_token:
          type: string
          nullable: true
        total_count:
          type: integer

    ContractTermsLinks:
      type: object
      properties:
        self:
          type: string
          format: uri
        versions:
          type: string
          format: uri
        active_version:
          type: string
          format: uri
          nullable: true

    TermsVersionLinks:
      type: object
      properties:
        self:
          type: string
          format: uri
        contract_terms:
          type: string
          format: uri
        clauses:
          type: string
          format: uri
        activate:
          type: string
          format: uri
          nullable: true
        cancel:
          type: string
          format: uri
          nullable: true

    ProblemDetail:
      type: object
      description: "RFC 9457"
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

  responses:
    BadRequest:
      description: "Requisicao invalida"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: "Nao encontrado"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: "Conflito de estado"
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ProblemDetail"
              - type: object
                properties:
                  current_state:
                    $ref: "#/components/schemas/TermsState"
    SupervisionRequired:
      description: "Requer supervisao humana"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    BusinessRuleViolation:
      description: "Regra de negocio violada"
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ProblemDetail"
              - type: object
                properties:
                  invariant:
                    type: string
                    description: "ID da invariante (e.g., inv-single-active-version)"
                  resolution_hint:
                    type: string
    TooManyRequests:
      description: "Rate limit"
      headers:
        Retry-After:
          schema:
            type: integer
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
