asyncapi: "3.0.0"
info:
  title: "Contract & Terms Registry Events"
  version: "1.0.0"
  description: |
    Superficie assincrona do CTR.

    ## Eventos publicados (outbound)
    - **ContractTermsActivated**: termos disponiveis para referencia
    - **ContractTermsSuperseded**: versao anterior substituida
    - **ContractTermsCancelled**: termos invalidados

    ## Evento consumido (inbound)
    - **SourcingDecisionMade** (SSC): trigger para contrato-quadro

    ## Garantias de entrega
    - At-least-once com deduplicacao por `ce_id`
    - Ordem por `mesh_sequence_number` dentro do aggregate
    - Schema backward-compatible (novos campos opcionais)

    ## Guidance para consumers
    - Processar eventos de forma idempotente (deduplicar por `ce_id`)
    - Usar `mesh_sequence_number` para detectar out-of-order
    - Activated e Superseded da mesma ativacao compartilham
      `mesh_correlation_id` — processar como par atomico

defaultContentType: "application/cloudevents+json; charset=utf-8"

channels:
  contractTermsActivated:
    address: "ctr.contract-terms.activated.v1"
    description: "Versao de termos ativada (draft -> active)"
    messages:
      ContractTermsActivated:
        $ref: "#/components/messages/ContractTermsActivated"

  contractTermsSuperseded:
    address: "ctr.contract-terms.superseded.v1"
    description: "Versao anterior supersedida por nova ativacao"
    messages:
      ContractTermsSuperseded:
        $ref: "#/components/messages/ContractTermsSuperseded"

  contractTermsCancelled:
    address: "ctr.contract-terms.cancelled.v1"
    description: "Termos cancelados (decisao supervisionada)"
    messages:
      ContractTermsCancelled:
        $ref: "#/components/messages/ContractTermsCancelled"

  sourcingDecisionMade:
    address: "ssc.sourcing-decision.made.v1"
    description: "Decisao de sourcing de SSC (consumido por CTR)"
    messages:
      SourcingDecisionMade:
        $ref: "#/components/messages/SourcingDecisionMade"

operations:
  publishContractTermsActivated:
    action: send
    channel:
      $ref: "#/channels/contractTermsActivated"
    summary: "Publicar ativacao"
    description: |
      Consumers: CMT, SCF, ITC.
      Se ativacao supersede versao anterior, ContractTermsSuperseded
      e emitido atomicamente com mesmo `mesh_correlation_id`.

  publishContractTermsSuperseded:
    action: send
    channel:
      $ref: "#/channels/contractTermsSuperseded"
    summary: "Publicar supersessao"
    description: "Consumers: CMT, SCF, DRC."

  publishContractTermsCancelled:
    action: send
    channel:
      $ref: "#/channels/contractTermsCancelled"
    summary: "Publicar cancelamento"
    description: "Consumers: CMT, DRC."

  consumeSourcingDecisionMade:
    action: receive
    channel:
      $ref: "#/channels/sourcingDecisionMade"
    summary: "Consumir decisao de sourcing de SSC"
    description: |
      ACL traduz modelo de SSC para linguagem contratual.
      Resultado: cmd-register-contract-terms com escopo derivado.

components:
  messages:
    ContractTermsActivated:
      name: "ContractTermsActivated"
      contentType: "application/cloudevents+json"
      headers:
        $ref: "#/components/schemas/CloudEventsHeaders"
      payload:
        $ref: "#/components/schemas/ActivatedPayload"

    ContractTermsSuperseded:
      name: "ContractTermsSuperseded"
      contentType: "application/cloudevents+json"
      headers:
        $ref: "#/components/schemas/CloudEventsHeaders"
      payload:
        $ref: "#/components/schemas/SupersededPayload"

    ContractTermsCancelled:
      name: "ContractTermsCancelled"
      contentType: "application/cloudevents+json"
      headers:
        $ref: "#/components/schemas/CloudEventsHeaders"
      payload:
        $ref: "#/components/schemas/CancelledPayload"

    SourcingDecisionMade:
      name: "SourcingDecisionMade"
      contentType: "application/cloudevents+json"
      description: "Schema definido por SSC — CTR consome via ACL"
      payload:
        type: object

  schemas:
    CloudEventsHeaders:
      type: object
      required: [ce_id, ce_type, ce_source, ce_specversion, ce_time]
      properties:
        ce_id:
          type: string
          format: uuid
          description: "ID unico para deduplicacao"
        ce_type:
          type: string
        ce_source:
          type: string
          description: "URN do aggregate origem (e.g., urn:mesh:ctr:contract-terms:{id})"
        ce_specversion:
          type: string
          enum: ["1.0"]
        ce_time:
          type: string
          format: date-time
        ce_subject:
          type: string
          description: "contractTermsId"
        mesh_sequence_number:
          type: integer
          description: "Ordem dentro do aggregate"
        mesh_correlation_id:
          type: string
          format: uuid
          description: "Liga eventos da mesma operacao atomica"
        mesh_schema_version:
          type: string
          enum: ["v1"]

    ActivatedPayload:
      type: object
      required: [contract_terms_id, version_number, scope,
                 validity_period, activated_at]
      properties:
        contract_terms_id:
          type: string
        version_number:
          type: integer
        scope:
          $ref: "#/components/schemas/ContractScope"
        validity_period:
          $ref: "#/components/schemas/ValidityPeriod"
        activated_at:
          type: string
          format: date-time

    SupersededPayload:
      type: object
      required: [contract_terms_id, superseded_version,
                 new_active_version, scope]
      properties:
        contract_terms_id:
          type: string
        superseded_version:
          type: integer
        new_active_version:
          type: integer
        scope:
          $ref: "#/components/schemas/ContractScope"

    CancelledPayload:
      type: object
      required: [contract_terms_id, version_number,
                 reason_type, cancelled_at]
      properties:
        contract_terms_id:
          type: string
        version_number:
          type: integer
        reason_type:
          type: string
          enum: [fraud, error, regulatory, other]
        reason_detail:
          type: string
        cancelled_at:
          type: string
          format: date-time

    ContractScope:
      type: object
      properties:
        contract_id:
          type: string
        scope_description:
          type: string

    ValidityPeriod:
      type: object
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
